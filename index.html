<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Anime</title>
    <style>
        /* --- 1. GLOBAL PREMIUM VARIABLES --- */
        :root {
            --bg-color: #0c0c0e; /* Deep cinematic black */
            --surface-color: #1a1a1f; /* Slightly lighter for cards */
            --accent-color: #7B61FF; /* Premium glowing purple */
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body, html {
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        /* --- 2. SMOOTH OPENING ANIMATION --- */
        #loader {
            position: fixed; 
            inset: 0; 
            background: var(--bg-color);
            display: flex; 
            justify-content: center; 
            align-items: center;
            z-index: 9999; 
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-text { 
            font-size: 2.5rem; 
            font-weight: 800; 
            letter-spacing: 8px; 
            animation: pulse 1.5s infinite; 
            text-transform: uppercase; 
        }

        @keyframes pulse { 
            0%, 100% { opacity: 0.4; text-shadow: 0 0 0px var(--accent-color); } 
            50% { opacity: 1; text-shadow: 0 0 25px var(--accent-color); } 
        }

        /* --- 3. GLASSMORPHISM NAVBAR --- */
        nav {
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 20px 4%; 
            box-sizing: border-box;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            z-index: 1000;
            transition: background 0.4s ease, backdrop-filter 0.4s ease;
        }

        nav.scrolled { 
            background: rgba(12, 12, 14, 0.7); 
            backdrop-filter: blur(15px); /* This gives the premium frosty look */
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        nav h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            color: var(--accent-color); 
            letter-spacing: 2px;
        }

        /* --- 4. CINEMATIC HERO SECTION --- */
        .hero {
            height: 85vh; 
            /* Placeholder background - you can change this URL! */
            background: linear-gradient(to top, var(--bg-color) 0%, transparent 100%), 
                        url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=2560') center/cover;
            display: flex; 
            align-items: flex-end; 
            padding: 60px 4%; 
            box-sizing: border-box;
        }

        .hero-content { 
            max-width: 650px; 
            animation: slideUp 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.8s both; 
        }

        .hero h2 { font-size: 3.5rem; margin: 0 0 15px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero p { font-size: 1.1rem; line-height: 1.6; color: #e0e0e0; margin-bottom: 25px; }
        
        .btn {
            padding: 14px 36px; 
            border: none; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease; 
            font-size: 1.05rem; 
            margin-right: 15px;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-primary:hover { 
            transform: scale(1.06); 
            box-shadow: 0 8px 25px rgba(123, 97, 255, 0.5); 
        }

        /* --- 5. PREMIUM HORIZONTAL SCROLL CARDS --- */
        .row { padding: 30px 4%; }
        .row h3 { margin-bottom: 20px; font-size: 1.4rem; font-weight: 600; }
        
        .cards {
            display: flex; 
            gap: 20px; 
            overflow-x: auto; 
            padding-bottom: 30px;
            padding-top: 10px;
            scrollbar-width: none; /* Hides scrollbar on Firefox */
        }
        .cards::-webkit-scrollbar { display: none; /* Hides scrollbar on Chrome/Safari */ }
        
        .card {
            min-width: 220px; 
            height: 330px; 
            background: var(--surface-color); 
            border-radius: 16px;
            overflow: hidden; 
            cursor: pointer; 
            position: relative;
            /* Dantotsu-style smooth bezier curve transition */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.4s ease, filter 0.4s ease; 
        }

        /* Hover Effects */
        .card:hover { 
            transform: scale(1.08) translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            z-index: 2; 
        }
        .card:hover img { 
            transform: scale(1.1);
            filter: brightness(0.6); 
        }

        .card-info {
            position: absolute; 
            bottom: -60px; /* Hidden initially */
            left: 0; right: 0; 
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 80%);
            transition: bottom 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card:hover .card-info { bottom: 0; /* Slides up on hover */ }
        .card-title { margin: 0; font-size: 1.1rem; font-weight: bold; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-text">ANIME APP</div></div>
    
    <nav id="navbar">
        <h1>ANIME APP</h1>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h2>Attack on Titan</h2>
            <p>Humanity's last stand against the terrifying Titans. Witness the epic conclusion in stunning high definition.</p>
            <button class="btn btn-primary">▶ Watch Now</button>
        </div>
    </section>

    <section class="row">
        <h3>Trending Now</h3>
        <div class="cards">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=1000" alt="Anime">
                <div class="card-info"><h4 class="card-title">Jujutsu Kaisen</h4></div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1580477667995-2b92f353364e?q=80&w=1000" alt="Anime">
                <div class="card-info"><h4 class="card-title">Demon Slayer</h4></div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa?q=80&w=1000" alt="Anime">
                <div class="card-info"><h4 class="card-title">Naruto Shippuden</h4></div>
            </div>
            </div>
    </section>

    <script>
        // 1. Controls the smooth opening screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.visibility = 'hidden', 800);
            }, 1500); // Stays on screen for 1.5 seconds
        });

        // 2. Makes the navigation bar blur when you scroll down
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) { 
                nav.classList.add('scrolled'); 
            } else { 
                nav.classList.remove('scrolled'); 
            }
        });
    </script>
</body>
</html>
