<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AniVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #070710;
  --surface: #0f0f1a;
  --card: #13131f;
  --card2: #1a1a2e;
  --border: #ffffff12;
  --accent: #c084fc;
  --accent2: #818cf8;
  --accent3: #f472b6;
  --gold: #fbbf24;
  --green: #34d399;
  --text: #f1f0ff;
  --text2: #a8a8c0;
  --text3: #58587a;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 70px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: var(--nav-h);
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { display: none; }

/* ── HEADER ── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  transition: background 0.3s;
}
.header.scrolled {
  background: rgba(7,7,16,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink: 0;
}
.header-right { display:flex; align-items:center; gap:10px; }
.search-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
}

/* ── SEARCH OVERLAY ── */
.search-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(7,7,16,0.97);
  backdrop-filter: blur(20px);
  display: none;
  flex-direction: column;
  padding: 60px 20px 20px;
  animation: fadeIn 0.2s ease;
}
.search-overlay.open { display: flex; }
.search-bar-wrap {
  position: relative;
  margin-bottom: 20px;
}
.search-overlay input {
  width: 100%;
  background: var(--card2);
  border: 1.5px solid var(--accent);
  border-radius: 50px;
  padding: 14px 50px 14px 20px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  outline: none;
  box-shadow: 0 0 20px rgba(192,132,252,0.15);
}
.search-close {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text2);
  font-size: 22px;
  cursor: pointer;
}
.search-hint {
  text-align: center;
  color: var(--text3);
  font-size: 14px;
  margin-top: 40px;
}
.search-hint .emoji { font-size: 36px; display:block; margin-bottom:10px; }

/* ── HERO ── */
.hero {
  position: relative;
  height: 100svh;
  max-height: 560px;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center top;
  transition: opacity 0.8s ease;
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(7,7,16,0.2) 0%,
    rgba(7,7,16,0.1) 30%,
    rgba(7,7,16,0.7) 70%,
    var(--bg) 100%
  );
}
.hero-content {
  position: absolute;
  bottom: 28px; left: 20px; right: 20px;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(192,132,252,0.2);
  border: 1px solid rgba(192,132,252,0.4);
  border-radius: 50px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1px;
  line-height: 1.05;
  margin-bottom: 8px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.hero-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.hero-score {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
}
.hero-dot { width:3px; height:3px; border-radius:50%; background:var(--text3); }
.hero-stat { font-size: 12px; color: var(--text2); font-weight: 500; }
.hero-desc {
  font-size: 13px;
  color: rgba(241,240,255,0.75);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 18px;
}
.hero-btns { display: flex; gap: 10px; }
.btn-primary {
  flex: 1;
  padding: 13px;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: white;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center; gap:6px;
  box-shadow: 0 4px 20px rgba(192,132,252,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  backdrop-filter: blur(8px);
}
.hero-dots {
  display: flex;
  gap: 5px;
  justify-content: center;
  margin-top: 16px;
}
.hero-dot-item {
  height: 3px;
  border-radius: 3px;
  background: rgba(255,255,255,0.25);
  transition: all 0.3s;
  cursor: pointer;
}
.hero-dot-item.active {
  width: 20px;
  background: var(--accent);
}
.hero-dot-item:not(.active) { width: 6px; }

/* ── SECTION ── */
.section { margin-bottom: 28px; }
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px 14px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-more {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 50px;
  background: rgba(192,132,252,0.1);
  border: 1px solid rgba(192,132,252,0.2);
}

/* ── HORIZONTAL SCROLL ── */
.h-scroll {
  display: flex;
  gap: 12px;
  padding: 0 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.h-scroll .card { scroll-snap-align: start; flex-shrink: 0; }

/* ── CARD PORTRAIT (small) ── */
.card-p {
  width: 130px;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  background: var(--card);
  border: 1px solid var(--border);
  transition: transform 0.2s;
}
.card-p:active { transform: scale(0.95); }
.card-p-img {
  position: relative;
  aspect-ratio: 3/4;
  overflow: hidden;
  background: var(--card2);
}
.card-p-img img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition: transform 0.3s;
}
.card-p:hover .card-p-img img { transform: scale(1.05); }
.card-p-score {
  position: absolute;
  bottom: 7px; left: 7px;
  background: rgba(7,7,16,0.85);
  backdrop-filter: blur(6px);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
}
.card-p-type {
  position: absolute;
  top: 7px; right: 7px;
  background: rgba(192,132,252,0.2);
  border: 1px solid rgba(192,132,252,0.35);
  border-radius: 5px;
  padding: 2px 7px;
  font-size: 9px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.card-p-info { padding: 8px 10px 10px; }
.card-p-title {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--text);
}
.card-p-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 500;
}

/* ── CARD WIDE ── */
.card-w {
  width: 220px;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  background: var(--card);
  border: 1px solid var(--border);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card-w:active { transform: scale(0.95); }
.card-w-img {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: var(--card2);
}
.card-w-img img { width:100%; height:100%; object-fit:cover; display:block; }
.card-w-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(7,7,16,0.9) 0%, transparent 60%);
}
.card-w-info { padding: 10px 12px 12px; }
.card-w-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 5px;
}
.card-w-meta { display:flex; gap:6px; align-items:center; }
.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--card2);
  color: var(--text2);
}
.tag.green { background: rgba(52,211,153,0.15); color: var(--green); }
.tag.purple { background: rgba(192,132,252,0.15); color: var(--accent); }

/* ── GRID SECTION ── */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 20px;
}
.card-g {
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  background: var(--card);
  border: 1px solid var(--border);
  transition: transform 0.2s;
  animation: fadeUp 0.4s ease both;
}
.card-g:active { transform: scale(0.96); }
@keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
.card-g-img {
  position: relative;
  aspect-ratio: 3/4;
  overflow: hidden;
  background: var(--card2);
}
.card-g-img img { width:100%; height:100%; object-fit:cover; display:block; }
.card-g-glow {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 65%;
  background: linear-gradient(to top, rgba(7,7,16,1) 0%, rgba(7,7,16,0.5) 50%, transparent 100%);
}
.card-g-rank {
  position: absolute;
  top: 8px; left: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: rgba(255,255,255,0.15);
  line-height: 1;
}
.card-g-score {
  position: absolute;
  bottom: 7px; left: 8px;
  display: flex; align-items:center; gap:3px;
  font-size: 11px; font-weight:700;
  color: var(--gold);
}
.card-g-type {
  position: absolute;
  top: 7px; right: 7px;
  background: rgba(192,132,252,0.2);
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 5px;
  padding: 2px 7px;
  font-size: 9px; font-weight:700;
  color: var(--accent);
  text-transform: uppercase;
}
.card-g-info { padding: 9px 11px 11px; }
.card-g-title {
  font-size: 12px; font-weight:600; line-height:1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 5px;
}
.card-g-meta { display:flex; gap:5px; flex-wrap:wrap; }
.card-g-tag {
  font-size: 10px;
  color: var(--text3);
  background: var(--surface);
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 500;
}

/* ── SKELETON ── */
.sk {
  background: linear-gradient(90deg, var(--card) 25%, #1e1e32 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: sk 1.3s infinite;
  border-radius: 8px;
}
@keyframes sk { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset:0;
  z-index: 200;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(16px);
  display: none;
  align-items: flex-end;
}
.modal-overlay.open { display:flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  border-top: 1px solid var(--border);
  width: 100%;
  max-height: 92svh;
  overflow-y: auto;
  animation: slideUp 0.35s cubic-bezier(0.32,1.6,0.64,1);
  scrollbar-width: none;
  padding-bottom: 50px;
}
@keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }

.modal-pill {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 14px auto 0;
}
.modal-hero {
  position: relative;
  height: 280px;
  overflow: hidden;
  background: var(--card);
  margin-top: 10px;
}
.modal-hero img.banner {
  width:100%; height:100%;
  object-fit:cover;
}
.modal-hero-grad {
  position:absolute; inset:0;
  background: linear-gradient(to top, var(--surface) 0%, rgba(15,15,26,0.5) 50%, transparent 100%);
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(7,7,16,0.7);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter: blur(8px);
}
.modal-poster {
  position: absolute;
  bottom: -36px; left: 20px;
  width: 88px; height: 124px;
  border-radius: 12px;
  object-fit: cover;
  border: 3px solid var(--surface);
  box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  background: var(--card);
}
.modal-body { padding: 50px 20px 20px; }
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.5px;
  line-height: 1.1;
  margin-bottom: 3px;
}
.modal-jp { font-size: 12px; color: var(--text3); margin-bottom: 16px; font-weight:500; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
}
.stat-box .val {
  font-size: 16px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 3px;
}
.stat-box .val.gold { color: var(--gold); }
.stat-box .val.purple { color: var(--accent); }
.stat-box .val.green { color: var(--green); }
.stat-box .lbl {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
}

.genres { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.genre {
  padding: 5px 13px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(129,140,248,0.12);
  border: 1px solid rgba(129,140,248,0.25);
  color: var(--accent2);
}
.syn-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text3);
  margin-bottom: 8px;
}
.syn-text {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text2);
  font-weight: 400;
}

/* ── STATUS CHIP ── */
.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 14px;
}
.status-chip.airing { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
.status-chip.finished { background: rgba(129,140,248,0.15); color: var(--accent2); border: 1px solid rgba(129,140,248,0.25); }
.status-chip.upcoming { background: rgba(251,191,36,0.15); color: var(--gold); border: 1px solid rgba(251,191,36,0.25); }
.status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left:0; right:0;
  height: var(--nav-h);
  background: rgba(7,7,16,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  z-index: 150;
  padding: 0 10px;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 12px;
}
.nav-item .nav-icon { font-size: 22px; line-height:1; }
.nav-item .nav-label { font-size: 10px; font-weight:600; color: var(--text3); transition: color 0.2s; }
.nav-item.active .nav-label { color: var(--accent); }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 6px rgba(192,132,252,0.6)); }

/* ── LOAD MORE ── */
.load-more-wrap { padding: 10px 20px 20px; }
.load-more-btn {
  width:100%;
  padding: 14px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.load-more-btn:active { background: var(--card2); }

/* ── ERROR ── */
.error-box {
  text-align:center;
  padding: 50px 20px;
  grid-column: 1/-1;
}
.error-emoji { font-size:44px; display:block; margin-bottom:12px; }
.error-msg { font-size:14px; color:var(--text3); margin-bottom:20px; line-height:1.5; }
.retry-btn {
  padding: 10px 28px;
  border-radius:50px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border:none;
  color:white;
  font-family:'Outfit',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

/* ── PAGES ── */
.page { display:none; }
.page.active { display:block; }

/* ── SEARCH PAGE ── */
.search-page-bar {
  position: sticky;
  top:0;
  z-index: 50;
  background: var(--bg);
  padding: 60px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.search-input-wrap { position:relative; }
.search-input-wrap input {
  width:100%;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 12px 20px 12px 46px;
  color: var(--text);
  font-family:'Outfit',sans-serif;
  font-size:15px;
  outline:none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(192,132,252,0.1);
}
.search-input-wrap input::placeholder { color:var(--text3); }
.search-input-icon {
  position:absolute;
  left:16px; top:50%;
  transform:translateY(-50%);
  font-size:17px;
  color:var(--text3);
  pointer-events:none;
}
.search-results { padding: 16px 20px; }
.search-empty {
  text-align:center;
  padding:60px 20px;
  color:var(--text3);
}
.search-empty .big { font-size:44px; display:block; margin-bottom:12px; }

/* ── TOP PAGE ── */
.top-page-filter {
  display:flex;
  gap:8px;
  padding: 70px 20px 16px;
  overflow-x:auto;
  scrollbar-width:none;
}
.filter-chip {
  flex-shrink:0;
  padding: 8px 18px;
  border-radius:50px;
  border: 1px solid var(--border);
  background:transparent;
  color:var(--text3);
  font-family:'Outfit',sans-serif;
