<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AniVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #e040fb;
    --accent2: #7c4dff;
    --gold: #ffd740;
    --text: #f0f0ff;
    --muted: #7070a0;
    --danger: #ff5370;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex-shrink: 0;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 20px 10px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(224,64,251,0.12);
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 16px 20px 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 7px 18px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: white;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    padding: 16px 20px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding: 0 20px 20px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: fadeUp 0.4s ease both;
    position: relative;
  }

  .card:active {
    transform: scale(0.97);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .card:hover .card-img-wrap img { transform: scale(1.05); }

  .card-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(8px);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-type {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(224,64,251,0.2);
    border: 1px solid rgba(224,64,251,0.3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
  }

  .card-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60%;
    background: linear-gradient(to top, rgba(10,10,15,0.95), transparent);
  }

  .card-info {
    padding: 10px 12px 12px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* SKELETON */
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: var(--radius);
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skel-card { aspect-ratio: 3/4; border-radius: var(--radius); }
  .skel-text { height: 12px; border-radius: 6px; margin: 6px 0; }
  .skel-text.short { width: 60%; }

  /* DETAIL MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    animation: none;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    scrollbar-width: none;
    padding-bottom: 40px;
  }

  .modal::-webkit-scrollbar { display: none; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto;
  }

  .modal-hero {
    position: relative;
    height: 260px;
    overflow: hidden;
  }

  .modal-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(0px);
  }

  .modal-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--surface) 10%, rgba(19,19,26,0.4) 60%, transparent);
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(10,10,15,0.7);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  .modal-poster {
    position: absolute;
    bottom: -30px;
    left: 20px;
    width: 90px;
    height: 130px;
    border-radius: 10px;
    object-fit: cover;
    border: 3px solid var(--surface);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .modal-body {
    padding: 44px 20px 20px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .modal-title-jp {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .stat-chip.gold { color: var(--gold); border-color: rgba(255,215,64,0.3); }
  .stat-chip.accent { color: var(--accent); border-color: rgba(224,64,251,0.3); }

  .genres {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .genre-tag {
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(124,77,255,0.15);
    border: 1px solid rgba(124,77,255,0.3);
    color: #b39ddb;
  }

  .synopsis-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .synopsis {
    font-size: 14px;
    line-height: 1.7;
    color: #c0c0d8;
  }

  /* EMPTY / ERROR */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* SCROLL TOP BTN */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(224,64,251,0.4);
    z-index: 150;
    transition: transform 0.2s;
  }
  .scroll-top.show { display: flex; }
  .scroll-top:active { transform: scale(0.9); }

  /* LOAD MORE */
  .load-more-wrap {
    padding: 0 20px 20px;
    text-align: center;
  }

  .load-more-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .load-more-btn:active {
    background: var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">AniVerse</div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off"/>
  </div>
</header>

<div class="tabs" id="tabsContainer">
  <button class="tab active" data-type="top">🔥 Top</button>
  <button class="tab" data-type="airing">📡 Airing</button>
  <button class="tab" data-type="upcoming">🗓 Upcoming</button>
  <button class="tab" data-type="movie">🎬 Movies</button>
  <button class="tab" data-type="bypopularity">⭐ Popular</button>
</div>

<div id="sectionTitle" class="section-title">Top Anime</div>
<div class="grid" id="animeGrid"></div>
<div class="load-more-wrap" id="loadMoreWrap" style="display:none">
  <button class="load-more-btn" id="loadMoreBtn">Load More</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-hero">
      <img id="modalBanner" src="" alt=""/>
      <div class="modal-hero-overlay"></div>
      <button class="modal-close" id="modalClose">✕</button>
      <img class="modal-poster" id="modalPoster" src="" alt=""/>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-title-jp" id="modalTitleJp"></div>
      <div class="stats-row" id="modalStats"></div>
      <div class="genres" id="modalGenres"></div>
      <div class="synopsis-title">Synopsis</div>
      <div class="synopsis" id="modalSynopsis"></div>
    </div>
  </div>
</div>

<button class="scroll-top" id="scrollTop">↑</button>

<script>
  const grid = document.getElementById('animeGrid');
  const searchInput = document.getElementById('searchInput');
  const sectionTitle = document.getElementById('sectionTitle');
  const modalOverlay = document.getElementById('modalOverlay');
  const loadMoreWrap = document.getElementById('loadMoreWrap');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const scrollTopBtn = document.getElementById('scrollTop');

  let currentPage = 1;
  let currentMode = 'top';
  let currentQuery = '';
  let isLoading = false;
  let hasNextPage = false;

  const tabTitles = {
    top: 'Top Anime',
    airing: 'Currently Airing',
    upcoming: 'Upcoming',
    movie: 'Movies',
    bypopularity: 'Most Popular'
  };

  // TABS
  document.getElementById('tabsContainer').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.type;
    currentQuery = '';
    searchInput.value = '';
    sectionTitle.textContent = tabTitles[currentMode];
    currentPage = 1;
    grid.innerHTML = '';
    loadMoreWrap.style.display = 'none';
    fetchAnime();
  });

  // SEARCH
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentQuery = searchInput.value.trim();
      currentPage = 1;
      grid.innerHTML = '';
      loadMoreWrap.style.display = 'none';
      if (currentQuery) {
        sectionTitle.textContent = `Results for "${currentQuery}"`;
        fetchSearch();
      } else {
        sectionTitle.textContent = tabTitles[currentMode];
        fetchAnime();
      }
    }, 500);
  });

  // LOAD MORE
  loadMoreBtn.addEventListener('click', () => {
    currentPage++;
    currentQuery ? fetchSearch(true) : fetchAnime(true);
  });

  // SCROLL TOP
  window.addEventListener('scroll', () => {
    scrollTopBtn.classList.toggle('show', window.scrollY > 400);
  });
  scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  function showSkeletons(count = 6) {
    grid.innerHTML = '';
    for (let i = 0; i < count; i++) {
      grid.innerHTML += `
        <div style="border-radius:14px;overflow:hidden;">
          <div class="skeleton skel-card"></div>
          <div style="padding:10px;">
            <div class="skeleton skel-text"></div>
            <div class="skeleton skel-text short"></div>
          </div>
        </div>`;
    }
  }

  async function fetchAnime(append = false) {
    if (isLoading) return;
    isLoading = true;
    if (!append) showSkeletons();

    const typeMap = {
      top: 'https://api.jikan.moe/v4/top/anime?type=tv&page=',
      airing: 'https://api.jikan.moe/v4/top/anime?filter=airing&page=',
      upcoming: 'https://api.jikan.moe/v4/top/anime?filter=upcoming&page=',
      movie: 'https://api.jikan.moe/v4/top/anime?type=movie&page=',
      bypopularity: 'https://api.jikan.moe/v4/top/anime?filter=bypopularity&page='
    };

    try {
      const res = await fetch(typeMap[currentMode] + currentPage);
      const data = await res.json();
      hasNextPage = data.pagination?.has_next_page || false;
      if (!append) grid.innerHTML = '';
      renderCards(data.data || []);
      loadMoreWrap.style.display = hasNextPage ? 'block' : 'none';
    } catch {
      if (!append) grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><span class="emoji">😵</span><p>Failed to load. Check your connection!</p></div>`;
    }
    isLoading = false;
  }

  async function fetchSearch(append = false) {
    if (isLoading) return;
    isLoading = true;
    if (!append) showSkeletons();

    try {
      const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(currentQuery)}&page=${currentPage}&limit=20`);
      const data = await res.json();
      hasNextPage = data.pagination?.has_next_page || false;
      if (!append) grid.innerHTML = '';
      const results = data.data || [];
      if (!results.length && !append) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><span class="emoji">🔍</span><p>No results found for "${currentQuery}"</p></div>`;
      } else {
        renderCards(results);
      }
      loadMoreWrap.style.display = hasNextPage ? 'block' : 'none';
    } catch {
      if (!append) grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><span class="emoji">😵</span><p>Search failed. Try again!</p></div>`;
    }
    isLoading = false;
  }

  function renderCards(list) {
    list.forEach((anime, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${(i % 10) * 0.04}s`;
      const score = anime.score ? `⭐ ${anime.score}` : '?';
      const episodes = anime.episodes ? `${anime.episodes} eps` : anime.status === 'Currently Airing' ? 'Airing' : '?';
      const type = anime.type || 'Anime';
      const img = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';

      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${img}" alt="${anime.title}" loading="lazy"/>
          <div class="card-badge">${score}</div>
          <div class="card-type">${type}</div>
          <div class="card-gradient"></div>
        </div>
        <div class="card-info">
          <div class="card-title">${anime.title}</div>
          <div class="card-meta">
            <span class="meta-tag">${episodes}</span>
            ${anime.year ? `<span class="meta-tag">${anime.year}</span>` : ''}
          </div>
        </div>`;

      card.addEventListener('click', () => openModal(anime));
      grid.appendChild(card);
    });
  }

  function openModal(anime) {
    const img = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
    document.getElementById('modalBanner').src = img;
    document.getElementById('modalPoster').src = img;
    document.getElementById('modalTitle').textContent = anime.title;
    document.getElementById('modalTitleJp').textContent = anime.title_japanese || '';

    const stats = document.getElementById('modalStats');
    stats.innerHTML = '';
    if (anime.score) stats.innerHTML += `<div class="stat-chip gold">⭐ ${anime.score}</div>`;
    if (anime.episodes) stats.innerHTML += `<div class="stat-chip">📺 ${anime.episodes} eps</div>`;
    if (anime.status) stats.innerHTML += `<div class="stat-chip accent">${anime.status}</div>`;
    if (anime.year) stats.innerHTML += `<div class="stat-chip">📅 ${anime.year}</div>`;
    if (anime.rank) stats.innerHTML += `<div class="stat-chip">🏆 #${anime.rank}</div>`;
    if (anime.members) stats.innerHTML += `<div class="stat-chip">👥 ${(anime.members/1000).toFixed(0)}K</div>`;

    const genres = document.getElementById('modalGenres');
    genres.innerHTML = (anime.genres || []).map(g => `<span class="genre-tag">${g.name}</span>`).join('');

    document.getElementById('modalSynopsis').textContent = anime.synopsis || 'No synopsis available.';

    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

  function closeModal() {
    modalOverlay.classList.remove('ope
